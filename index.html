<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCARA UI Style</title>
<style>
    body { margin: 0; background: #0a0f1c; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ======================
// 기본 설정
// ======================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75, window.innerWidth/window.innerHeight, 0.1, 1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ======================
// 카메라
// ======================
camera.position.set(0, 6, 10);
camera.lookAt(0, 0, 0);

// ======================
// 조명 (UI 느낌 핵심🔥)
// ======================
const light = new THREE.PointLight(0x00aaff, 1);
light.position.set(5, 10, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x222244);
scene.add(ambient);

// ======================
// 바닥 (어두운 UI)
// ======================
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshPhongMaterial({ color: 0x111827 })
);
floor.rotation.x = Math.PI / 2;
scene.add(floor);

// ======================
// 베이스
// ======================
const base = new THREE.Mesh(
    new THREE.CylinderGeometry(1, 1, 1),
    new THREE.MeshPhongMaterial({ color: 0x1f2937 })
);
scene.add(base);

// ======================
// 팔 1 (파란 라인 느낌)
// ======================
const arm1 = new THREE.Mesh(
    new THREE.BoxGeometry(4, 0.4, 0.4),
    new THREE.MeshPhongMaterial({
        color: 0x0ea5e9,
        emissive: 0x0ea5e9,
        emissiveIntensity: 0.5
    })
);

arm1.position.x = 2;
base.add(arm1);

// ======================
// 팔 2
// ======================
const arm2 = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.3, 0.3),
    new THREE.MeshPhongMaterial({
        color: 0x38bdf8,
        emissive: 0x38bdf8,
        emissiveIntensity: 0.6
    })
);

arm2.position.x = 3.5;
arm1.add(arm2);

// ======================
// 끝단 (툴)
// ======================
const tool = new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshPhongMaterial({ color: 0xffffff })
);

tool.position.x = 2;
arm2.add(tool);

// ======================
// 애니메이션
// ======================
let t = 0;

function animate() {
    requestAnimationFrame(animate);

    t += 0.01;

    // 부드러운 움직임
    base.rotation.y = Math.sin(t) * 1.5;
    arm1.rotation.y = Math.cos(t) * 1.0;

    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
